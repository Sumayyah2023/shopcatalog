<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — ShopCatalog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">🛒 ShopCatalog</a>
  <div class="nav-links">
    <a href="index.html">Products</a>
    <a href="cart.html" class="active">
      <div class="cart-icon">🛍️
        <span class="cart-badge" id="cart-count" style="display:none">0</span>
      </div>
    </a>
    <div id="user-menu" style="display:flex; align-items:center; gap:0.5rem;">
      <span style="font-weight:600; color:var(--gray)">👤 <span id="user-name"></span></span>
      <button class="btn btn-secondary btn-sm" onclick="api.logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container" style="margin-top:2rem">
  <div class="breadcrumb">
    <a href="index.html">Home</a> / Cart
  </div>
  <h2 style="margin-bottom:1.5rem;font-size:1.5rem">Your Shopping Cart</h2>
  <div id="cart-content"></div>
</div>

<script src="js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  updateNavAuth();
  if (!api.token()) {
    document.getElementById('cart-content').innerHTML = `
      <div class="empty-state">
        <div class="icon">🔒</div>
        <h3>Please login to view your cart</h3>
        <a href="index.html" class="btn btn-primary" style="margin-top:1rem">Go to Shop</a>
      </div>`;
    return;
  }
  loadCart();
});

async function loadCart() {
  try {
    const cart = await api.getCart();
    const badge = document.getElementById('cart-count');
    if (badge) {
      badge.textContent = cart.items.length;
      badge.style.display = cart.items.length > 0 ? 'flex' : 'none';
    }

    if (cart.items.length === 0) {
      document.getElementById('cart-content').innerHTML = `
        <div class="empty-state">
          <div class="icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet</p>
          <a href="index.html" class="btn btn-primary" style="margin-top:1.5rem">Start Shopping</a>
        </div>`;
      return;
    }

    const itemsHTML = cart.items.map(item => `
      <div class="cart-item" id="cart-item-${item.id}">
        <img src="${item.image_url}" alt="${item.name}" />
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${parseFloat(item.price).toFixed(2)} × ${item.quantity}</div>
        </div>
        <div class="cart-item-subtotal">$${parseFloat(item.subtotal).toFixed(2)}</div>
        <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">✕ Remove</button>
      </div>`).join('');

    const shipping = parseFloat(cart.total) > 50 ? 0 : 4.99;
    const tax = (parseFloat(cart.total) * 0.08).toFixed(2);
    const grandTotal = (parseFloat(cart.total) + shipping + parseFloat(tax)).toFixed(2);

    document.getElementById('cart-content').innerHTML = `
      <div class="cart-layout">
        <div class="cart-items-list">${itemsHTML}</div>
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>$${parseFloat(cart.total).toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : '$' + shipping.toFixed(2)}</span></div>
          <div class="summary-row"><span>Tax (8%)</span><span>$${tax}</span></div>
          <div class="summary-row summary-total"><span>Total</span><span>$${grandTotal}</span></div>
          <button class="btn btn-primary" style="width:100%;padding:0.8rem;margin-top:1rem;font-size:1rem" onclick="checkout()">
            Proceed to Checkout →
          </button>
          <a href="index.html" class="btn btn-secondary" style="width:100%;justify-content:center;margin-top:0.5rem">
            Continue Shopping
          </a>
          ${shipping > 0 ? `<p style="font-size:0.8rem;color:var(--gray);text-align:center;margin-top:0.75rem">
            Add $${(50 - parseFloat(cart.total)).toFixed(2)} more for free shipping!
          </p>` : ''}
        </div>
      </div>`;
  } catch (err) {
    document.getElementById('cart-content').innerHTML = `
      <div class="empty-state"><div class="icon">😕</div><h3>Failed to load cart</h3></div>`;
  }
}

async function removeItem(id) {
  try {
    await api.removeFromCart(id);
    toast('Item removed from cart');
    loadCart();
  } catch (err) { toast(err.message, 'error'); }
}

function checkout() {
  toast('🎉 Order placed successfully! (Mock checkout)', 'success');
  setTimeout(() => window.location = 'index.html', 2000);
}
</script>
</body>
</html>
